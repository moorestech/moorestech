<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iter Improve Result Viewer</title>
    <style>
      :root { color-scheme: dark; font-family: Inter, system-ui, sans-serif; background: #111315; color: #eef1f4; }
      body { margin: 0; }
      header { padding: 20px 24px; border-bottom: 1px solid #2c3238; background: #181b1f; }
      h1 { margin: 0 0 8px; font-size: 24px; letter-spacing: 0; }
      main { display: grid; grid-template-columns: 340px 1fr; min-height: calc(100vh - 86px); }
      aside { border-right: 1px solid #2c3238; padding: 16px; background: #15181b; overflow: auto; }
      section { padding: 18px; overflow: auto; }
      button { width: 100%; margin: 4px 0; padding: 10px; border: 1px solid #38414a; background: #20252a; color: #eef1f4; text-align: left; border-radius: 6px; cursor: pointer; }
      button.active { border-color: #51a7f9; background: #17324a; }
      .cards { display: grid; grid-template-columns: repeat(4, minmax(120px, 1fr)); gap: 10px; margin: 14px 0; }
      .card { border: 1px solid #303740; border-radius: 8px; padding: 12px; background: #1b1f24; }
      .label { color: #9ca7b3; font-size: 12px; }
      .value { font-size: 24px; font-weight: 700; margin-top: 4px; }
      .tabs { display: flex; gap: 8px; margin: 16px 0; flex-wrap: wrap; }
      .tabs button { width: auto; }
      pre { white-space: pre-wrap; overflow-wrap: anywhere; background: #0d0f11; border: 1px solid #2c3238; border-radius: 8px; padding: 14px; line-height: 1.5; }
      table { width: 100%; border-collapse: collapse; margin-top: 12px; }
      th, td { border-bottom: 1px solid #2c3238; padding: 8px; text-align: left; vertical-align: top; }
      th { color: #aeb8c2; font-weight: 600; }
      ul { padding-left: 20px; }
      @media (max-width: 820px) { main { grid-template-columns: 1fr; } aside { border-right: 0; border-bottom: 1px solid #2c3238; } .cards { grid-template-columns: 1fr 1fr; } }
    </style>
  </head>
  <body>
    <header>
      <h1>run-skill-iter-improve Result Viewer</h1>
      <div id="source" class="label"></div>
    </header>
    <main>
      <aside>
        <div class="label">Runs</div>
        <div id="runs"></div>
      </aside>
      <section>
        <div class="cards" id="summary"></div>
        <div class="tabs" id="tabs"></div>
        <div id="content"></div>
      </section>
    </main>
    <script>
      let data;
      let selectedRun = "";
      let selectedTab = "iterLog";

      // テキストはHTMLとして解釈せず安全に表示する
      // Render text safely without interpreting it as HTML
      function escapeHtml(text) {
        return String(text ?? "").replace(/[&<>"']/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;" }[char]));
      }

      function score(value) {
        return value === null || value === undefined ? "-" : value;
      }

      // 採点結果を比較しやすいカードに整形する
      // Format evaluation numbers as comparison cards
      function renderSummary() {
        const items = [
          ["Runs", data.summary.runCount],
          ["Scored", data.summary.scoredCount],
          ["Avg overall", score(data.summary.averageOverall)],
          ["Avg goal", score(data.summary.averageGoal)],
        ];
        document.getElementById("summary").innerHTML = items.map(([label, value]) => `<div class="card"><div class="label">${label}</div><div class="value">${value}</div></div>`).join("");
      }

      function renderRuns() {
        document.getElementById("runs").innerHTML = data.runs.map((run) => {
          const evalText = run.evaluation ? ` overall ${run.evaluation.overall_score} / goal ${run.evaluation.goal_score}` : " no eval";
          const active = run.name === selectedRun ? " active" : "";
          return `<button class="${active}" data-run="${run.name}">${escapeHtml(run.name)}<br><span class="label">${evalText}</span></button>`;
        }).join("");
        document.querySelectorAll("[data-run]").forEach((button) => button.addEventListener("click", () => {
          selectedRun = button.dataset.run;
          selectedTab = "plan";
          render();
        }));
      }

      function renderTabs() {
        const tabs = [
          ["iterLog", "Iter Log"],
          ["reproContext", "Context"],
          ["rubric", "Rubric"],
          ["improvementDiff", "Diff"],
          ["plan", "Selected Plan"],
          ["evaluation", "Selected Eval"],
        ];
        document.getElementById("tabs").innerHTML = tabs.map(([id, label]) => `<button class="${id === selectedTab ? "active" : ""}" data-tab="${id}">${label}</button>`).join("");
        document.querySelectorAll("[data-tab]").forEach((button) => button.addEventListener("click", () => {
          selectedTab = button.dataset.tab;
          render();
        }));
      }

      // 選択中のrunに紐づく本文と評価を表示する
      // Show the selected run plan and evaluation payload
      function renderContent() {
        const run = data.runs.find((item) => item.name === selectedRun);
        if (["iterLog", "reproContext", "rubric", "improvementDiff"].includes(selectedTab)) {
          document.getElementById("content").innerHTML = `<pre>${escapeHtml(data.documents[selectedTab] || "(missing)")}</pre>`;
          return;
        }
        if (!run) {
          document.getElementById("content").innerHTML = "<pre>No run selected.</pre>";
          return;
        }
        if (selectedTab === "plan") {
          document.getElementById("content").innerHTML = `<pre>${escapeHtml(run.plan || "(missing plan.md)")}</pre>`;
          return;
        }
        document.getElementById("content").innerHTML = renderEvaluation(run.evaluation);
      }

      function renderEvaluation(evaluation) {
        if (!evaluation) return "<pre>(missing eval-output.json)</pre>";
        const high = (evaluation.high || []).map((item) => `<li>${escapeHtml(item)}</li>`).join("");
        const medium = (evaluation.medium || []).map((item) => `<li>${escapeHtml(item)}</li>`).join("");
        return `<table><tr><th>overall</th><td>${score(evaluation.overall_score)}</td></tr><tr><th>goal</th><td>${score(evaluation.goal_score)}</td></tr><tr><th>breakdown</th><td><pre>${escapeHtml(JSON.stringify(evaluation.breakdown, null, 2))}</pre></td></tr></table><h2>High</h2><ul>${high}</ul><h2>Medium</h2><ul>${medium}</ul><h2>Raw JSON</h2><pre>${escapeHtml(JSON.stringify(evaluation, null, 2))}</pre>`;
      }

      function render() {
        renderSummary();
        renderRuns();
        renderTabs();
        renderContent();
      }

      fetch("/api/result").then((response) => response.json()).then((payload) => {
        data = payload;
        selectedRun = data.runs[0]?.name || "";
        document.getElementById("source").textContent = data.sourceDir;
        render();
      });
    </script>
  </body>
</html>
