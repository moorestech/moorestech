<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live Trial Result Viewer</title>
    <style>
      :root { color-scheme: dark; font-family: Inter, system-ui, sans-serif; background: #101214; color: #edf1f5; }
      body { margin: 0; }
      header { padding: 20px 24px; border-bottom: 1px solid #2d343b; background: #171a1e; }
      h1 { margin: 0 0 8px; font-size: 24px; letter-spacing: 0; }
      main { display: grid; grid-template-columns: 360px 1fr; min-height: calc(100vh - 86px); }
      aside { border-right: 1px solid #2d343b; padding: 16px; background: #14171a; overflow: auto; }
      section { padding: 18px; overflow: auto; }
      button { width: 100%; margin: 4px 0; padding: 10px; border: 1px solid #3a434c; background: #20262b; color: #edf1f5; text-align: left; border-radius: 6px; cursor: pointer; }
      button.active { border-color: #69c27c; background: #183621; }
      .cards { display: grid; grid-template-columns: repeat(4, minmax(120px, 1fr)); gap: 10px; margin: 14px 0; }
      .card { border: 1px solid #303840; border-radius: 8px; padding: 12px; background: #1b2025; }
      .label { color: #9da8b3; font-size: 12px; }
      .value { font-size: 24px; font-weight: 700; margin-top: 4px; }
      .tabs { display: flex; gap: 8px; margin: 16px 0; flex-wrap: wrap; }
      .tabs button { width: auto; }
      pre { white-space: pre-wrap; overflow-wrap: anywhere; background: #0d0f11; border: 1px solid #2d343b; border-radius: 8px; padding: 14px; line-height: 1.5; }
      table { width: 100%; border-collapse: collapse; margin-top: 12px; }
      th, td { border-bottom: 1px solid #2d343b; padding: 8px; text-align: left; vertical-align: top; }
      th { color: #aeb9c4; font-weight: 600; }
      @media (max-width: 820px) { main { grid-template-columns: 1fr; } aside { border-right: 0; border-bottom: 1px solid #2d343b; } .cards { grid-template-columns: 1fr 1fr; } }
    </style>
  </head>
  <body>
    <header>
      <h1>run-skill-live-trial Result Viewer</h1>
      <div id="source" class="label"></div>
    </header>
    <main>
      <aside>
        <div class="label">Trials</div>
        <div id="trials"></div>
      </aside>
      <section>
        <div class="cards" id="summary"></div>
        <div class="tabs" id="tabs"></div>
        <div id="content"></div>
      </section>
    </main>
    <script>
      let data;
      let selectedTrial = "";
      let selectedTab = "report";

      // テキストはHTMLとして解釈せず安全に表示する
      // Render text safely without interpreting it as HTML
      function escapeHtml(text) {
        return String(text ?? "").replace(/[&<>"']/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;" }[char]));
      }

      function renderSummary() {
        const items = [
          ["Trials", data.summary.trialCount],
          ["Status files", data.summary.withStatus],
          ["Reports", data.summary.withReport],
          ["Transcripts", data.summary.withTranscript],
        ];
        document.getElementById("summary").innerHTML = items.map(([label, value]) => `<div class="card"><div class="label">${label}</div><div class="value">${value}</div></div>`).join("");
      }

      // trial単位の完走状況を左ペインに並べる
      // List per-trial completion signals in the sidebar
      function renderTrials() {
        document.getElementById("trials").innerHTML = data.trials.map((trial) => {
          const status = trial.status ? "status.json" : "no status";
          const lines = `${trial.transcript.lineCount} transcript lines`;
          const active = trial.name === selectedTrial ? " active" : "";
          return `<button class="${active}" data-trial="${trial.name}">${escapeHtml(trial.name)}<br><span class="label">${status} / ${lines}</span></button>`;
        }).join("");
        document.querySelectorAll("[data-trial]").forEach((button) => button.addEventListener("click", () => {
          selectedTrial = button.dataset.trial;
          selectedTab = "report";
          render();
        }));
      }

      function renderTabs() {
        const tabs = [
          ["report", "Report"],
          ["task", "Task"],
          ["workflow", "Workflow"],
          ["status", "Status"],
          ["transcript", "Transcript Stats"],
          ["pane", "Pane"],
        ];
        document.getElementById("tabs").innerHTML = tabs.map(([id, label]) => `<button class="${id === selectedTab ? "active" : ""}" data-tab="${id}">${label}</button>`).join("");
        document.querySelectorAll("[data-tab]").forEach((button) => button.addEventListener("click", () => {
          selectedTab = button.dataset.tab;
          render();
        }));
      }

      // 選択中のtrialに紐づく成果物をタブ表示する
      // Show artifacts for the selected trial in tabs
      function renderContent() {
        const trial = data.trials.find((item) => item.name === selectedTrial);
        if (!trial) {
          document.getElementById("content").innerHTML = "<pre>No trial selected.</pre>";
          return;
        }
        if (selectedTab === "status") {
          const statusText = trial.status ? JSON.stringify(trial.status, null, 2) : "(missing out/status.json)";
          document.getElementById("content").innerHTML = `<pre>${escapeHtml(statusText)}</pre>`;
          return;
        }
        if (selectedTab === "transcript") {
          document.getElementById("content").innerHTML = renderTranscript(trial);
          return;
        }
        const text = trial[selectedTab] || `(missing ${selectedTab})`;
        document.getElementById("content").innerHTML = `<pre>${escapeHtml(text)}</pre>`;
      }

      function renderTranscript(trial) {
        const models = trial.transcript.models.length ? trial.transcript.models.join(", ") : "-";
        return `<table><tr><th>Directory</th><td>${escapeHtml(trial.dir)}</td></tr><tr><th>Lines</th><td>${trial.transcript.lineCount}</td></tr><tr><th>Models</th><td>${escapeHtml(models)}</td></tr></table>`;
      }

      function render() {
        renderSummary();
        renderTrials();
        renderTabs();
        renderContent();
      }

      fetch("/api/result").then((response) => response.json()).then((payload) => {
        data = payload;
        selectedTrial = data.trials[0]?.name || "";
        document.getElementById("source").textContent = data.sourceDir;
        render();
      });
    </script>
  </body>
</html>
