id: machineRecipes
type: object
isDefaultOpen: true
properties:
  - key: data
    type: array
    overrideCodeGeneratePropertyName: MachineRecipeMasterElement
    items:
      type: object
      properties:
        - key: machineRecipeGuid
          type: uuid
          autoGenerated: true
        - key: blockGuid
          type: uuid
          foreignKey:
            schemaId: blocks
            foreignKeyIdPath: /data/[*]/blockGuid
            displayElementPath: /data/[*]/name
        - key: time
          type: number
          default: 1
        - key: inputItems
          type: array
          items:
            type: object
            properties:
              - key: itemGuid
                type: uuid
                foreignKey:
                  schemaId: items
                  foreignKeyIdPath: /data/[*]/itemGuid
                  displayElementPath: /data/[*]/name
              - key: count
                type: integer
                default: 1
        - key: inputFluids
          type: array
          items:
            type: object
            properties:
              - key: fluidGuid
                type: uuid
                foreignKey:
                  schemaId: fluids
                  foreignKeyIdPath: /data/[*]/fluidGuid
                  displayElementPath: /data/[*]/name
              - key: amount
                type: number
        - key: outputItems
          type: array
          items:
            type: object
            properties:
              - key: itemGuid
                type: uuid
                foreignKey:
                  schemaId: items
                  foreignKeyIdPath: /data/[*]/itemGuid
                  displayElementPath: /data/[*]/name
              - key: count
                type: integer
                default: 1
              - key: percent
                type: number
                default: 1
                minimum: 0
                maximum: 1
        - key: outputFluids
          type: array
          items:
            type: object
            properties:
              - key: fluidGuid
                type: uuid
                foreignKey:
                  schemaId: fluids
                  foreignKeyIdPath: /data/[*]/fluidGuid
                  displayElementPath: /data/[*]/name
              - key: amount
                type: number
        - key: energyOverrideType
          type: enum
          options:
            - None
            - Electric
            - Gear
          default: None
        - key: energyOverride
          switch: ./energyOverrideType
          cases:
            - when: None
              type: object
              optional: true
              properties: []
            - when: Electric
              type: object
              properties:
                - key: requiredPower
                  type: number
            - when: Gear
              type: object
              properties:
                - key: requireTorque
                  type: number
                  optional: true
                - key: requiredRpm
                  type: number
                  optional: true
