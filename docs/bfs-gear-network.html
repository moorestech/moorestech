    const IconCog = (p) => <Icon {...p} d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6zM19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06A2 2 0 1 1 4.27 16.96l.06-.06A1.65 1.65 0 0 0 4.66 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.66 1.65 1.65 0 0 0 10 3.15V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9c.13.3.2.62.2.95v.1c0 .33.07.65.2.95z" stroke={1.2} />;
    const IconQueue = (p) => <Icon {...p} d="M4 7h16M4 12h16M4 17h10" />;
    const IconSet = (p) => <Icon {...p} d="M8 6a4 4 0 0 0 0 12M16 6a4 4 0 0 1 0 12" />;
    const IconWave = (p) => <Icon {...p} d="M2 12c3-4 5 4 8 0s5 4 8 0 3-4 4-4" />;
    const IconBook = (p) => <Icon {...p} d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />;

    /* ─────────────────────────────────────────
       Utility: classnames
       ───────────────────────────────────────── */
    const cx = (...c) => c.filter(Boolean).join(' ');

    /* ─────────────────────────────────────────
       Section wrapper
       ───────────────────────────────────────── */
    const Section = ({ chapter, kicker, title, children, tone = 'paper' }) => (
      <section className={cx(
        'w-full border-t border-rule',
        tone === 'paper' && 'bg-paper',
        tone === 'ink' && 'bg-ink text-paper',
        tone === 'soft' && 'bg-white/60',
      )}>
        <div className="max-w-5xl mx-auto px-6 md:px-10 py-20 md:py-28">
          {chapter && (
            <div className="flex items-baseline gap-3 mb-4">
              <span className={cx('chapter-num text-xs font-mono tracking-widest',
                tone === 'ink' ? 'text-paper/60' : 'text-inkSoft')}>
                {chapter}
              </span>
              {kicker && (
                <span className={cx('text-xs uppercase tracking-[0.2em] font-semibold',

            <h2 className={cx('text-3xl md:text-4xl font-bold leading-tight tracking-tight mb-8 md:mb-10',

          )}

        </div>

    /* ─────────────────────────────────────────
       Hero
       ───────────────────────────────────────── */
    const Hero = () => (
      <header className="relative bg-paper grid-paper border-b border-rule">
        <div className="max-w-5xl mx-auto px-6 md:px-10 pt-20 pb-28 md:pt-28 md:pb-36">
          <div className="flex items-center gap-2 text-[11px] uppercase tracking-[0.25em] text-inkSoft font-semibold mb-10">
            <span className="w-8 h-px bg-inkSoft"></span>
            <span>Computational Proof / Technical Explainer</span>
          </div>
          <h1 className="text-4xl md:text-6xl font-extrabold leading-[1.1] tracking-tight mb-8">
            BFSはなぜ<br className="hidden md:block"/>
            <span className="text-accent">連結成分を漏れなく</span><br className="hidden md:block"/>
            列挙できるのか。
          </h1>
          <p className="text-lg md:text-xl text-inkSoft leading-relaxed max-w-2xl mb-12">
            ギアネットワーク分断問題から学ぶ、幅優先探索の正当性・終端性・完全性。<br/>
            1,294 ギアの連結網に 1 つ穴を開けたとき、残された網は何個の島に分かれるのか——その答えを O(V+E) で返すアルゴリズムの骨組みを、図と手順で最後まで追い切る。
          </p>

          <div className="grid md:grid-cols-3 gap-4 mt-12">
            {[
              { n: '01', t: '訪問済みマーク', d: '同じノードを二度起点にしない。HashSet へ追加できた瞬間「初訪問」と確定する。' },
              { n: '02', t: 'キューでの境界制御', d: 'これから処理するノードを順番待ちさせる。処理のたび新しい波紋が外側へ広がる。' },
              { n: '03', t: '外側ループ', d: '一つの島を舐め終わった後、到達できなかった残りから次の起点を選び直す。島をまたいでも漏れない。' },
            ].map(({ n, t, d }) => (
              <div key={n} className="border border-rule bg-white/60 p-5 hover-lift">
                <div className="text-xs font-mono text-accent mb-2">{n}</div>
                <div className="font-bold text-lg mb-1">{t}</div>
                <div className="text-sm text-inkSoft leading-relaxed">{d}</div>
              </div>
            ))}
          </div>

          <div className="mt-16 flex items-center gap-3 text-sm text-inkSoft">
            <IconArrowDown size={18} />
            <span>縦スクロールで最後まで、論理の流れをそのまま辿れる構成にしています。</span>
          </div>
        </div>
      </header>
    );

    /* ─────────────────────────────────────────
       Chapter 01 — 問題の発端
       ───────────────────────────────────────── */
    const Chapter01 = () => (
      <Section chapter="01 / 08" kicker="Problem Setup" title="なぜ BFS が必要になったのか">
        <div className="grid md:grid-cols-5 gap-10 mb-10">
          <div className="md:col-span-3 space-y-5 text-[15px] leading-relaxed text-ink">
            <p>
              moorestech サーバーではギア（歯車・シャフト・生成器）同士が接続して <span className="font-semibold">ギアネットワーク</span> を構成する。1 つのネットワークは 1 台の発電機に支配され、接続するすべての歯車へトルクと回転を供給する。
            </p>
            <p>
              プレイヤーが網の <span className="font-semibold">内側にあるシャフトを破壊</span> すると、残った網は<br/>
              <span className="text-inkSoft">(a)</span> 穴が空いても 1 つの網のまま、もしくは<br/>
              <span className="text-inkSoft">(b)</span> 切り離されて 2 つ以上の独立した網に分裂する。
            </p>
            <p>
              ゲームの整合性のためには、削除直後にこれを判定し、分裂していれば<span className="font-semibold">成分ごとに新しいネットワークを再構築</span> しなければならない。
            </p>
          </div>
          <div className="md:col-span-2">
            <SvgSplitTeaser />
          </div>
        </div>

        <div className="border border-rule bg-white/70 p-6 md:p-8">
          <div className="text-xs uppercase tracking-widest text-rose font-semibold mb-3">旧実装の問題</div>
          <div className="grid md:grid-cols-2 gap-6 items-start">
            <div className="text-[15px] leading-relaxed">
              旧 <code className="bg-ink/5 px-1.5 py-0.5 rounded text-[13px]">RemoveGear</code> は「ネットワーク内の全ギアを dict から抜いて、もう一度 <code className="bg-ink/5 px-1.5 py-0.5 rounded text-[13px]">AddGear</code> で再構築」という乱暴な手続きを取っていた。
              結果、内部の <code className="bg-ink/5 px-1.5 py-0.5 rounded text-[13px]">MergeNetworks</code> が N 回呼ばれ、そのたびに Dictionary 全件スキャン <span className="font-mono">O(M²)</span> が走る。
            </div>
            <div className="font-mono text-[13px] bg-ink text-paper p-5 rounded-sm">
              <div className="text-amber/80 mb-2">// 旧実装の計算量</div>
              <div>N = 削除ネット内ギア数</div>
              <div>M = ワールド全ギア数</div>
              <div className="mt-2">cost ≈ O(N × M²)</div>
              <div className="mt-2 text-rose">= 1294 × 1887² ≈ 4.6×10⁹ ops</div>
              <div className="mt-2 text-inkSoft">→ メインスレッド 10 秒超停止</div>
            </div>
          </div>
        </div>

        <div className="mt-6 text-[15px] leading-relaxed">
          メインスレッドが 10 秒止まれば、同じスレッドでパケット処理を回している通信システムは応答不能になる。クライアント側の <code className="bg-ink/5 px-1.5 py-0.5 rounded text-[13px]">PacketExchangeManager</code> が 10 秒タイムアウトで <code className="bg-ink/5 px-1.5 py-0.5 rounded text-[13px]">null</code> を返し、その null を null ガードせずに参照したコードが NullReferenceException を投げる——この連鎖が、ユーザーの観測した不具合の正体だった。
        </div>
      </Section>
    );

    const SvgSplitTeaser = () => (
      <svg viewBox="0 0 320 280" className="w-full h-auto">
        <defs>
          <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M0,0 L10,5 L0,10 z" fill="#64748B" />
          </marker>
        </defs>
        <g>
          <text x="20" y="20" fontSize="11" fill="#64748B" fontWeight="600" letterSpacing="0.1em">BEFORE</text>
          {[[40,60],[90,60],[140,60],[190,60],[240,60]].map(([x,y],i)=>(
            <g key={`b${i}`}>
              <line x1={x} y1={y} x2={(i<4)?x+42:x} y2={y} stroke="#0F172A" strokeWidth="1.5" opacity={i<4?1:0}/>
              <circle cx={x} cy={y} r="12" fill="#F8F6F1" stroke="#0F172A" strokeWidth="1.6"/>
            </g>
          ))}
        </g>
        <g transform="translate(0,60)">
          <line x1="155" y1="40" x2="155" y2="80" stroke="#64748B" strokeWidth="1.5" markerEnd="url(#arr)"/>
          <text x="165" y="66" fontSize="11" fill="#64748B">中央のギアを削除</text>
        </g>
        <g transform="translate(0,140)">
          <text x="20" y="20" fontSize="11" fill="#64748B" fontWeight="600" letterSpacing="0.1em">AFTER</text>
          {[[40,60],[90,60],[140,60]].map(([x,y],i)=>(
            <g key={`a1${i}`}>
              <line x1={x} y1={y} x2={(i<2)?x+42:x} y2={y} stroke="#059669" strokeWidth="1.6" opacity={i<2?1:0}/>
              <circle cx={x} cy={y} r="12" fill="#ECFDF5" stroke="#059669" strokeWidth="1.6"/>
            </g>
          ))}
          <circle cx={190} cy={60} r="12" fill="none" stroke="#DB2777" strokeWidth="1.6" strokeDasharray="3 3"/>
          <line x1={180} y1={50} x2={200} y2={70} stroke="#DB2777" strokeWidth="1.6"/>
          <line x1={200} y1={50} x2={180} y2={70} stroke="#DB2777" strokeWidth="1.6"/>
          {[[240,60],[290,60]].map(([x,y],i)=>(
            <g key={`a2${i}`}>
              <line x1={x} y1={y} x2={(i<1)?x+42:x} y2={y} stroke="#1E40AF" strokeWidth="1.6" opacity={i<1?1:0}/>
              <circle cx={x} cy={y} r="12" fill="#EFF6FF" stroke="#1E40AF" strokeWidth="1.6"/>
            </g>
          ))}
          <text x="40" y="100" fontSize="11" fill="#059669" fontWeight="600">成分 A</text>
          <text x="240" y="100" fontSize="11" fill="#1E40AF" fontWeight="600">成分 B</text>
        </g>
      </svg>
    );

    /* ─────────────────────────────────────────
       Chapter 02 — グラフとしてのギアネット
       ───────────────────────────────────────── */
    const Chapter02 = () => (
      <Section chapter="02 / 08" kicker="Graph Abstraction" title="ギアネットを「グラフ」として捉え直す">
        <div className="grid md:grid-cols-2 gap-10 items-start">
          <div className="space-y-5 text-[15px] leading-relaxed">
            <p>
              ギア 1 個を <span className="font-semibold">ノード (頂点)</span>、噛み合い・シャフト伝達などの接続 1 本を <span className="font-semibold">エッジ (辺)</span> と読み替える。これで世界は無向グラフ <span className="font-mono">G = (V, E)</span> になる。
            </p>
            <p>
              ギア削除の判定問題はこう言い換えられる——
            </p>
            <div className="border-l-4 border-accent pl-4 py-2 bg-white/60 font-medium text-ink">
              「ノード <span className="font-mono">v</span> を取り除いたあとの <span className="font-mono">G − v</span> は、何個の連結成分を持つか？」
            </div>
            <p>
              この抽象化が効く瞬間、「ゲーム固有の特殊ケース」はすべて消え、問題はグラフ理論の古典的連結性判定に帰着する。教科書と同じ戦略を取れる。
            </p>
          </div>
          <div className="bg-white/60 border border-rule p-6">
            <div className="text-xs uppercase tracking-widest text-inkSoft font-semibold mb-4">Graph Model</div>
            <SvgGraphModel />
            <div className="mt-5 grid grid-cols-2 gap-3 text-[13px]">
              <div>
                <div className="font-semibold">V (Vertices)</div>
                <div className="text-inkSoft">シャフト、歯車、ジェネレータの個体</div>
              </div>
              <div>
                <div className="font-semibold">E (Edges)</div>
                <div className="text-inkSoft">噛み合い・伝達の接続 1 本</div>
              </div>
            </div>
          </div>
        </div>
      </Section>
    );

    const SvgGraphModel = () => (
      <svg viewBox="0 0 320 200" className="w-full h-auto">
        {[
          [40,50,100,50],[100,50,160,50],[160,50,160,120],[160,120,220,120],[220,120,280,120],[100,50,100,120],
        ].map(([x1,y1,x2,y2],i)=> (
          <line key={i} x1={x1} y1={y1} x2={x2} y2={y2} stroke="#0F172A" strokeWidth="1.5"/>
        ))}
        {[
          [40,50,'N₀'],[100,50,'N₁'],[160,50,'N₂'],[100,120,'N₃'],[160,120,'N₄'],[220,120,'N₅'],[280,120,'N₆'],
        ].map(([x,y,label],i)=>(
          <g key={i}>
            <circle cx={x} cy={y} r={14} fill="#F8F6F1" stroke="#0F172A" strokeWidth="1.8"/>
            <text x={x} y={y+4} textAnchor="middle" fontSize="10" fontFamily="JetBrains Mono" fontWeight="600">{label}</text>
          </g>
        ))}
      </svg>
    );

    /* ─────────────────────────────────────────
       Chapter 03 — 連結成分とは
       ───────────────────────────────────────── */
    const Chapter03 = () => (
      <Section chapter="03 / 08" kicker="Definition" title="連結成分 (Connected Component) の数学的定義">
        <div className="grid md:grid-cols-5 gap-10 items-start">
          <div className="md:col-span-3 space-y-5 text-[15px] leading-relaxed">
            <div className="border-l-4 border-ink pl-5 py-1">
              <div className="text-xs uppercase tracking-widest text-inkSoft font-semibold">連結</div>
              <div className="font-medium">任意の 2 ノード <span className="font-mono">u, v ∈ V</span> が、辺を辿って行き来できる。</div>
            </div>
            <div className="border-l-4 border-ink pl-5 py-1">
              <div className="text-xs uppercase tracking-widest text-inkSoft font-semibold">連結成分</div>
              <div className="font-medium">グラフ G の「極大連結部分グラフ」。これ以上ノードを足すと連結でなくなる、ギリギリの集合。</div>
            </div>
            <p>
              一つのグラフが完全に連結なら成分は <span className="font-mono">1</span> 個。島が分かれていればその数だけ成分がある。
              「ネットワーク分裂の検出」は、<span className="font-semibold">G − v の連結成分を列挙する</span> 作業そのもの。
            </p>
            <p className="text-inkSoft">
              ここで重要なのは、成分は <span className="font-semibold">排他的・網羅的</span> であること（各ノードはちょうど 1 つの成分に属する）。だから「A 成分に属するなら B 成分には属さない」「どこの成分にも属さないノードは存在しない」が保証される。
            </p>
          </div>
          <div className="md:col-span-2 bg-white/60 border border-rule p-6">
            <div className="text-xs uppercase tracking-widest text-inkSoft font-semibold mb-4">3 成分に分かれたグラフの例</div>
            <SvgThreeComponents />
          </div>
        </div>
      </Section>
    );

    const SvgThreeComponents = () => {
      const comps = [
        { color: '#059669', bg: '#ECFDF5', nodes: [[30,40],[80,40],[55,80]], edges: [[0,1],[0,2],[1,2]] },
        { color: '#1E40AF', bg: '#EFF6FF', nodes: [[150,60],[200,60]], edges: [[0,1]] },
        { color: '#D97706', bg: '#FEF3C7', nodes: [[260,30],[260,80],[260,130]], edges: [[0,1],[1,2]] },
      ];

              '帰納: 距離 k の全ノードが visited に入っているとする。距離 k+1 のノード v を任意に取る。v は距離 k のどれかのノード u と辺で繋がっている。',

              'よって距離 k+1 のノードも全て visited に入る。帰納法により距離 ∞ まで、R(s) の全要素が visited に含まれる。',

                <tr><td className="py-2.5 pr-4 font-semibold text-amber">合計</td><td className="py-2.5 font-mono text-right font-bold text-amber">O(V + E)</td></tr>

            </table>
          </div>
          <div className="border border-paper/20 bg-paper/5 p-6">
            <div className="text-xs uppercase tracking-widest text-emerald font-bold mb-3">旧実装との比較 (N=1294, M=1887)</div>
            <div className="space-y-4 text-[14px]">
              <div>
                <div className="text-paper/70 mb-1">旧 <span className="font-mono">RemoveGear</span> (全破壊・全再構築)</div>
                <div className="font-mono text-rose text-lg">O(N × M²) ≈ 4.6×10⁹ ops</div>
                <div className="text-xs text-paper/50 mt-1">メインスレッド 10 秒超停止</div>
              </div>
              <div className="border-t border-paper/10 pt-4">
                <div className="text-paper/70 mb-1">新 <span className="font-mono">RemoveGear</span> (BFS ベース)</div>
                <div className="font-mono text-emerald text-lg">O(V + E) ≈ 数千 ops</div>
                <div className="text-xs text-paper/50 mt-1">体感 0 ms</div>
              </div>
              <div className="font-mono text-[11px] text-amber pt-2 border-t border-paper/10">速度差 6 桁超</div>
            </div>
          </div>
        </div>

        <div className="border border-paper/20 bg-paper/5 p-6 mb-12">
          <div className="text-xs uppercase tracking-widest text-amber font-bold mb-4">BFS と DFS の等価性</div>
          <div className="grid md:grid-cols-2 gap-6 text-[14px]">
            <div>
              <div className="font-mono font-bold text-lg mb-2 text-accentSoft">BFS — Queue (FIFO)</div>
              <ul className="space-y-2 text-paper/70 list-disc pl-5">
                <li>探索が同心円状に外へ広がる</li>
                <li>見つかる順に「起点からの距離」が単調増加</li>

              </ul>
            </div>
            <div>
              <div className="font-mono font-bold text-lg mb-2 text-amber">DFS — Stack (LIFO)</div>
              <ul className="space-y-2 text-paper/70 list-disc pl-5">
                <li>探索が一本道で深く潜り、行き止まりで戻る</li>
                <li>直感的に「迷路を辿る」に近い</li>
                <li>再帰実装はスタック溢れリスクあり。反復 Stack 推奨</li>
              </ul>
            </div>
          </div>
          <div className="mt-6 pt-5 border-t border-paper/10 text-[14px] text-paper/70 leading-relaxed">
            <span className="text-amber font-semibold">連結成分の列挙に限れば両者は等価。</span>
            返す成分集合は同じ、計算量も同じ <span className="font-mono">O(V+E)</span>。キューをスタックに置き換えても Lemma 1–4 はそのまま成立する。今回の実装で BFS を選んだのは習慣的な理由で、特段の優位性はない。
          </div>

        <div className="border border-paper/20 bg-paper/5 p-6 mb-12">
          <div className="text-xs uppercase tracking-widest text-emerald font-bold mb-4">ソースコード対応</div>
          <div className="font-mono text-[12px] leading-[1.55] overflow-auto whitespace-pre text-paper/90"><code>{String.raw`static List<List<IGearEnergyTransformer>> FindComponents(
    List<IGearEnergyTransformer> allGears,
    HashSet<BlockInstanceId>     memberSet)
{
    var components = new List<List<IGearEnergyTransformer>>();   // ← Lemma 4 の出力列
    var visited    = new HashSet<BlockInstanceId>();              // ← visited
    var queue      = new Queue<IGearEnergyTransformer>();         // ← 波紋の先端

    foreach (var start in allGears)                                // ← 外側ループ / Lemma 4
    {
        if (!visited.Add(start.BlockInstanceId)) continue;         // ← 既起点ならスキップ

        var component = new List<IGearEnergyTransformer>();
        queue.Clear();
        queue.Enqueue(start);

        while (queue.Count > 0)                                    // ← 内側 BFS / Lemma 1,2,3
        {
            var current = queue.Dequeue();
            component.Add(current);

            foreach (var connect in current.GetGearConnects())
            {
                var neighborId = connect.Transformer.BlockInstanceId;
                if (!memberSet.Contains(neighborId)) continue;      // ← 境界で遮断 / Lemma 2
                if (!visited.Add(neighborId))        continue;      // ← 判定 + 登録を原子化
                queue.Enqueue(connect.Transformer);
            }
        }
        components.Add(component);
    }
    return components;
}`}</code></div>

            </li>

              </div>
            </li>
            <li className="flex gap-3">
              <IconX size={18} className="text-rose flex-shrink-0 mt-0.5" />
              <div>
                <span className="font-semibold text-paper">再帰 DFS はスタック深さで事故る。</span>
                1,294 ギアが鎖状に繋がった局所ケースでは深さがそのまま再帰段数になる。反復 BFS / 反復 DFS のどちらかにすること。
              </div>
            </li>
            <li className="flex gap-3">
              <IconX size={18} className="text-rose flex-shrink-0 mt-0.5" />
              <div>
                <span className="font-semibold text-paper">成分が 1 つだけの時に map を書き換えるのは無駄。</span>
                BFS 完走後に <span className="font-mono">components.Count == 1</span> なら分裂しておらず既存ネットをそのまま維持できる。Dictionary への書き込み 0 回で済む高速パスを忘れずに。
              </div>
            </li>
          </ul>
        </div>

        <div className="border border-amber/30 bg-amber/5 p-6">
          <div className="text-xs uppercase tracking-widest text-amber font-bold mb-3">結論</div>
          <div className="text-[15px] leading-relaxed text-paper/90">
            BFS が連結成分を漏れなく・余計になく・必ず有限時間で列挙できるのは、<span className="text-amber font-semibold">visited による冪等化</span>・<span className="text-amber font-semibold">queue による順序管理</span>・<span className="text-amber font-semibold">外側ループによる残滓回収</span>・<span className="text-amber font-semibold">memberSet による境界制御</span> の 4 点がそれぞれ独立した役割を果たしているから。
            どれか 1 つが欠けると上で並べた Lemma が崩れ、正しさか性能かのどちらかを失う。逆にこの 4 点が揃っている実装は、ギアの規模が 10 倍になっても計算量が O(V+E) のまま保たれ、サーバーの応答性能は維持される。
          </div>
        </div>
      </Section>
    );
