name: Sync skills directories

on:
  push:
    branches:
      - master
    paths:
      - '.agents/skills/**'
      - '.claude/skills/**'
      - '.codex/skills/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-skills:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine sync source
        id: source
        shell: bash
        run: |
          set -euo pipefail
          changed_files=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}")
          echo "Changed files:"$'\n'"${changed_files}"

          agents_changed=false
          claude_changed=false
          codex_changed=false

          if echo "${changed_files}" | grep -q '^\.agents/skills/'; then
            agents_changed=true
          fi

          if echo "${changed_files}" | grep -q '^\.claude/skills/'; then
            claude_changed=true
          fi

          if echo "${changed_files}" | grep -q '^\.codex/skills/'; then
            codex_changed=true
          fi

          changed_count=0

          if ${agents_changed}; then
            changed_count=$((changed_count + 1))
          fi

          if ${claude_changed}; then
            changed_count=$((changed_count + 1))
          fi

          if ${codex_changed}; then
            changed_count=$((changed_count + 1))
          fi

          if [[ ${changed_count} -gt 1 ]]; then
            echo "Multiple skill directories changed; skipping sync."
            echo "skip=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if ${agents_changed}; then
            echo "source=.agents/skills" >> "${GITHUB_OUTPUT}"
            {
              echo "targets<<EOF"
              echo ".claude/skills"
              echo ".codex/skills"
              echo "EOF"
              echo "targets_markdown<<EOF"
              echo "- \`.claude/skills\`"
              echo "- \`.codex/skills\`"
              echo "EOF"
            } >> "${GITHUB_OUTPUT}"
            echo "skip=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if ${claude_changed}; then
            echo "source=.claude/skills" >> "${GITHUB_OUTPUT}"
            {
              echo "targets<<EOF"
              echo ".agents/skills"
              echo ".codex/skills"
              echo "EOF"
              echo "targets_markdown<<EOF"
              echo "- \`.agents/skills\`"
              echo "- \`.codex/skills\`"
              echo "EOF"
            } >> "${GITHUB_OUTPUT}"
            echo "skip=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if ${codex_changed}; then
            echo "source=.codex/skills" >> "${GITHUB_OUTPUT}"
            {
              echo "targets<<EOF"
              echo ".agents/skills"
              echo ".claude/skills"
              echo "EOF"
              echo "targets_markdown<<EOF"
              echo "- \`.agents/skills\`"
              echo "- \`.claude/skills\`"
              echo "EOF"
            } >> "${GITHUB_OUTPUT}"
            echo "skip=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "No skill directory changes detected; skipping sync."
          echo "skip=true" >> "${GITHUB_OUTPUT}"

      - name: Sync directories
        if: steps.source.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          source_dir="${{ steps.source.outputs.source }}"
          while IFS= read -r target_dir; do
            mkdir -p "${target_dir}"
            rsync -a --delete "${source_dir}/" "${target_dir}/"
          done <<< "${{ steps.source.outputs.targets }}"

      - name: Create pull request
        id: create-pr
        if: steps.source.outputs.skip != 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Sync skills directory"
          title: "Sync skills directory"
          body: |
            ## Summary
            - Sync skills directory changes from `${{ steps.source.outputs.source }}` to:
            ${{ steps.source.outputs.targets_markdown }}
          branch: "sync-skills-${{ github.run_id }}"
          delete-branch: true

      - name: Auto-merge pull request
        if: steps.create-pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge "${{ steps.create-pr.outputs.pull-request-number }}" --merge --delete-branch
