name: Mooresmaster Test

on:
  push:
    branches: [ "master" ]
    paths:
      - 'mooresmaster/**'
  pull_request:
    paths:
      - 'mooresmaster/**'

  # 手動実行デバッグ用
  # Manual execution for debugging
  workflow_dispatch: {}

# PR更新時に同一PRの古い実行をキャンセルする（groupはworkflow×ref単位。PRのrefはrefs/pull/N/mergeでPRごとに一意）。
# cancel-in-progressをPRイベント限定にしているため、masterへのpushや手動実行が実行中にキャンセルされることはない。
# Cancel outdated runs of the same PR on update (the group is per workflow and ref; a PR's ref is unique per PR).
# cancel-in-progress only applies to PR events, so master pushes and manual runs are never cancelled mid-run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    name: Mooresmaster Test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Build Generator
      run: dotnet build mooresmaster/mooresmaster.Generator/ -c release

    - name: Run Tests
      run: dotnet test mooresmaster/
