name: Unity Test
on:
  pull_request:
    paths-ignore:
      - '**/*.md'

  # 手動実行デバッグ用
  workflow_dispatch: {}

# PR更新時に同一PRの古い実行をキャンセルする（groupはworkflow×ref単位。PRのrefはrefs/pull/N/mergeでPRごとに一意）。
# cancel-in-progressをPRイベント限定にしているため、手動実行(workflow_dispatch)が実行中にキャンセルされることはない。
# Cancel outdated runs of the same PR on update (the group is per workflow and ref; a PR's ref is unique per PR).
# cancel-in-progress only applies to PR events, so manual workflow_dispatch runs are never cancelled mid-run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    name: EditMode Test (Client + Server)
    runs-on: ubuntu-latest
    steps:
      # 使用するGithub Tokenを動的に生成する
      # 利用は ${{ steps.generate_token.outputs.token }}
      - name: Generate github token
        id: generate_token
        uses: tibdex/github-app-token@v1
        with:
          app_id: ${{ secrets.APP_ID }}
          private_key: ${{ secrets.PRIVATE_KEY }}

      # リポジトリとサブモジュールをチェックアウト
      - name: Check out my unity project.
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # 年月日を取得　キャッシュのkeyに利用
      - name: Set current datetime as env variable
        env:
          TZ: 'Asia/Tokyo'
        run: echo "CURRENT_DATETIME=$(date +'%Y-%m')" >> $GITHUB_ENV

      # キャッシュ keyを月跨ぎで更新することで定期的にキャッシュ自体の更新を行う
      - uses: actions/cache@v3
        with:
          path: moorestech_client/Library
          key: "Library_Test_${{ env.CURRENT_DATETIME }}"

      # GameCI の Test runner を利用して
      # EditMode のテストを実行する
      - name: Run Unity Test
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: moorestech_client/
          githubToken: ${{ steps.generate_token.outputs.token }}
          unityVersion: 6000.3.8f1
          testMode: editmode
          customParameters: '-testCategory "!IgnoreCI"'

      # テストの実行結果をアーティファクトにアップロードしてダウンロードして参照できるようにする
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Test results
          path: artifacts
