# CI の失敗が「flaky / インフラ起因 / 原因不明」に見えるときだけ、失敗ジョブを自動で再実行するウォッチドッグ。
# PR が更新されて新しい run がある場合や head ブランチが消えた場合は、古い run の再実行をスキップする。
# 判定ロジック本体は .github/scripts/ci-auto-rerun.cjs にある。
# Auto-rerun watchdog that reruns failed jobs only when the failure looks flaky/infra-related/unknown.
# Skips rerunning stale runs when the PR already has a newer run or the head branch is gone.
# The decision logic itself lives in .github/scripts/ci-auto-rerun.cjs.
name: CI Auto Retry (Flaky Failure Rerun)

on:
  # 対象 CI ワークフローの完了イベントを監視する（名前は各 workflow の name: と厳密一致させること）。
  # Watch completion events of the target CI workflows (names must exactly match each workflow's name:).
  workflow_run:
    workflows:
      - "Unity Test"
      - "Unity Build"
      - "Mooresmaster Test"
    types:
      - completed

# 失敗ジョブの再実行には actions: write が必要。
# actions: write is required to trigger the rerun-failed-jobs endpoint.
permissions:
  actions: write
  contents: read

jobs:
  auto-rerun:
    runs-on: ubuntu-latest
    # pull_request 起因の run で、かつ結論が failure / timed_out のときだけ動かす。
    # Only act on pull_request runs that concluded as failure or timed_out.
    if: >-
      github.event.workflow_run.event == 'pull_request' &&
      (github.event.workflow_run.conclusion == 'failure' ||
       github.event.workflow_run.conclusion == 'timed_out')
    steps:
      # 判定スクリプトだけを sparse checkout で取得する（workflow_run はデフォルトブランチの内容で実行される）。
      # Sparse-checkout only the decision script (workflow_run always runs the default-branch version).
      - name: Checkout rerun script
        uses: actions/checkout@v4
        with:
          filter: blob:none
          sparse-checkout: .github/scripts

      - name: Evaluate failure and rerun if flaky/infra/unknown
        uses: actions/github-script@v7
        with:
          script: |
            const evaluateAndRerun = require('./.github/scripts/ci-auto-rerun.cjs');
            await evaluateAndRerun({ github, context, core });
