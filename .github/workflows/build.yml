name: Build

on:
  pull_request:
    paths-ignore:
      - '**/*.md'

  # 手動実行デバッグ用
  workflow_dispatch: {}

jobs:
  # ===== サーバービルド =====
  # game-ci/unity-builder はmacOSでネイティブ実行のため、
  # 同一ジョブ内で2回呼ぶとライセンス認証が競合する。
  # そのためサーバーとクライアントを別ジョブに分割している。
  server-build:
    name: Server Build - ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.runner }}

    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        platform:
          # ==========================================
          # プラットフォームの追加/削除でビルド対象を切り替え可能
          # Linux ビルドは一時的に無効化
          # ==========================================
          - name: StandaloneWindows64
            buildMethod: BuildPipeline.WindowsBuildFromGithubAction
            runner: windows-latest
            isDedicatedServer: false
          - name: StandaloneOSX
            buildMethod: BuildPipeline.MacOsBuildFromGithubAction
            runner: macos-latest
            isDedicatedServer: false
          # - name: StandaloneLinux64
          #   buildMethod: BuildPipeline.LinuxDedicatedServerFromGithubAction
          #   runner: ubuntu-latest
          #   isDedicatedServer: true

    steps:
      # Checkout
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Update submodules
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive

      # 年月日を取得　キャッシュのkeyに利用
      - name: Set current datetime as env variable
        env:
          TZ: 'Asia/Tokyo'
        run: echo "CURRENT_DATETIME=$(date +'%Y-%m')" >> $GITHUB_ENV

      # キャッシュ keyを月跨ぎで更新することで定期的にキャッシュ自体の更新を行う
      - uses: actions/cache@v3
        with:
          path: moorestech_server/Library
          key: "Server_Library_${{ env.CURRENT_DATETIME }}"

      # アーティファクト名を設定（GUI版とDedicated Serverで区別）
      - name: Set artifact name
        id: artifact
        shell: bash
        run: |
          if [ "${{ matrix.platform.isDedicatedServer }}" = "true" ]; then
            echo "name=Server_Output_DedicatedServer_${{ matrix.platform.name }}" >> $GITHUB_OUTPUT
            echo "path=moorestech_server/Output_DedicatedServer_${{ matrix.platform.name }}" >> $GITHUB_OUTPUT
          else
            echo "name=Server_Output_${{ matrix.platform.name }}" >> $GITHUB_OUTPUT
            echo "path=moorestech_server/Output_${{ matrix.platform.name }}" >> $GITHUB_OUTPUT
          fi

      # Build
      - name: Server Build - ${{ matrix.platform.name }}
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: 6000.3.8f1
          buildMethod: ${{ matrix.platform.buildMethod }}
          targetPlatform: ${{ matrix.platform.name }}
          allowDirtyBuild: true
          projectPath: moorestech_server/

      # Upload Build (Windows, Mac)
      - name: Upload Server Build
        if: matrix.platform.name != 'StandaloneLinux64'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: ${{ steps.artifact.outputs.path }}

      # Archive for Linux
      - name: Archive Server Build for Linux
        if: matrix.platform.name == 'StandaloneLinux64'
        run: |
          tar -czvf server_output.tar.gz ${{ steps.artifact.outputs.path }}

      - name: Upload Server Build for Linux
        if: matrix.platform.name == 'StandaloneLinux64'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: ./server_output.tar.gz

  # ===== クライアントビルド =====
  # サーバービルド完了後に実行される
  client-build:
    name: Client Build - ${{ matrix.platform.name }}
    needs: server-build
    runs-on: ${{ matrix.platform.runner }}

    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        platform:
          # ==========================================
          # プラットフォームの追加/削除でビルド対象を切り替え可能
          # Linux はランナーの容量が足りないためクライアントビルドは除外
          # ==========================================
          - name: StandaloneWindows64
            buildMethod: BuildPipeline.WindowsBuildFromGithubAction
            runner: windows-latest
          - name: StandaloneOSX
            buildMethod: BuildPipeline.MacOsBuildFromGithubAction
            runner: macos-latest

    steps:
      # Checkout
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Update submodules
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive

      # 年月日を取得　キャッシュのkeyに利用
      - name: Set current datetime as env variable
        env:
          TZ: 'Asia/Tokyo'
        run: echo "CURRENT_DATETIME=$(date +'%Y-%m')" >> $GITHUB_ENV

      # キャッシュ keyを月跨ぎで更新することで定期的にキャッシュ自体の更新を行う
      - uses: actions/cache@v3
        with:
          path: moorestech_client/Library
          key: "Library_${{ env.CURRENT_DATETIME }}"

      # Build
      - name: Client Build - ${{ matrix.platform.name }}
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: 6000.3.8f1
          buildMethod: ${{ matrix.platform.buildMethod }}
          targetPlatform: ${{ matrix.platform.name }}
          allowDirtyBuild: true
          projectPath: moorestech_client/

      # Upload Build (Windows, Mac)
      - name: Upload Client Build
        if: matrix.platform.name != 'StandaloneLinux64'
        uses: actions/upload-artifact@v4
        with:
          name: Client_Output_${{ matrix.platform.name }}
          path: moorestech_client/Output_${{ matrix.platform.name }}

      # Archive for Linux
      - name: Archive Client Build for Linux
        if: matrix.platform.name == 'StandaloneLinux64'
        run: |
          tar -czvf client_output.tar.gz moorestech_client/Output_${{ matrix.platform.name }}

      - name: Upload Client Build for Linux
        if: matrix.platform.name == 'StandaloneLinux64'
        uses: actions/upload-artifact@v4
        with:
          name: Client_Output_${{ matrix.platform.name }}
          path: ./client_output.tar.gz
