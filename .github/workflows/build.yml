name: Build

on:
  pull_request:
    paths-ignore:
      - '**/*.md'

  # 手動実行デバッグ用
  workflow_dispatch: {}

jobs:
  build:
    name: Build - ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.runner }}

    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        platform:
          # ==========================================
          # buildServer / buildClient を true/false に変更するだけで
          # 各プラットフォームのビルド対象を切り替え可能
          # 1PFあたり サーバービルド → クライアントビルド の順に直列実行
          # ==========================================
          - name: StandaloneWindows64
            runner: windows-latest
            buildServer: true
            buildClient: true
            serverBuildMethod: BuildPipeline.WindowsBuildFromGithubAction
            clientBuildMethod: BuildPipeline.WindowsBuildFromGithubAction
            isDedicatedServer: false
          - name: StandaloneOSX
            runner: macos-latest
            buildServer: true
            buildClient: true
            serverBuildMethod: BuildPipeline.MacOsBuildFromGithubAction
            clientBuildMethod: BuildPipeline.MacOsBuildFromGithubAction
            isDedicatedServer: false
          - name: StandaloneLinux64
            runner: ubuntu-latest
            buildServer: true
            buildClient: false # ランナーの容量が足りないためクライアントビルドは無効
            serverBuildMethod: BuildPipeline.LinuxDedicatedServerFromGithubAction
            clientBuildMethod: ''
            isDedicatedServer: true

    steps:
      # Checkout
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Update submodules
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive

      # 年月日を取得　キャッシュのkeyに利用
      - name: Set current datetime as env variable
        env:
          TZ: 'Asia/Tokyo'
        run: echo "CURRENT_DATETIME=$(date +'%Y-%m')" >> $GITHUB_ENV

      # サーバーLibraryキャッシュ
      - name: Cache Server Library
        if: ${{ matrix.platform.buildServer }}
        uses: actions/cache@v3
        with:
          path: moorestech_server/Library
          key: "Server_Library_${{ env.CURRENT_DATETIME }}"

      # クライアントLibraryキャッシュ
      - name: Cache Client Library
        if: ${{ matrix.platform.buildClient }}
        uses: actions/cache@v3
        with:
          path: moorestech_client/Library
          key: "Library_${{ env.CURRENT_DATETIME }}"

      # サーバーアーティファクト名を設定（GUI版とDedicated Serverで区別）
      - name: Set server artifact name
        if: ${{ matrix.platform.buildServer }}
        id: server-artifact
        shell: bash
        run: |
          if [ "${{ matrix.platform.isDedicatedServer }}" = "true" ]; then
            echo "name=Server_Output_DedicatedServer_${{ matrix.platform.name }}" >> $GITHUB_OUTPUT
            echo "path=moorestech_server/Output_DedicatedServer_${{ matrix.platform.name }}" >> $GITHUB_OUTPUT
          else
            echo "name=Server_Output_${{ matrix.platform.name }}" >> $GITHUB_OUTPUT
            echo "path=moorestech_server/Output_${{ matrix.platform.name }}" >> $GITHUB_OUTPUT
          fi

      # ===== Server Build =====
      - name: Server Build - ${{ matrix.platform.name }}
        if: ${{ matrix.platform.buildServer }}
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: 6000.3.8f1
          buildMethod: ${{ matrix.platform.serverBuildMethod }}
          targetPlatform: ${{ matrix.platform.name }}
          allowDirtyBuild: true
          projectPath: moorestech_server/

      # サーバービルド成果物アップロード（Windows, Mac）
      - name: Upload Server Build
        if: ${{ matrix.platform.buildServer && matrix.platform.name != 'StandaloneLinux64' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.server-artifact.outputs.name }}
          path: ${{ steps.server-artifact.outputs.path }}

      # サーバービルド成果物アーカイブ（Linux）
      - name: Archive Server Build for Linux
        if: ${{ matrix.platform.buildServer && matrix.platform.name == 'StandaloneLinux64' }}
        run: |
          tar -czvf server_output.tar.gz ${{ steps.server-artifact.outputs.path }}

      - name: Upload Server Build for Linux
        if: ${{ matrix.platform.buildServer && matrix.platform.name == 'StandaloneLinux64' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.server-artifact.outputs.name }}
          path: ./server_output.tar.gz

      # ===== Client Build =====
      - name: Client Build - ${{ matrix.platform.name }}
        if: ${{ matrix.platform.buildClient }}
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: 6000.3.8f1
          buildMethod: ${{ matrix.platform.clientBuildMethod }}
          targetPlatform: ${{ matrix.platform.name }}
          allowDirtyBuild: true
          projectPath: moorestech_client/

      # クライアントビルド成果物アップロード（Windows, Mac）
      - name: Upload Client Build
        if: ${{ matrix.platform.buildClient && matrix.platform.name != 'StandaloneLinux64' }}
        uses: actions/upload-artifact@v4
        with:
          name: Client_Output_${{ matrix.platform.name }}
          path: moorestech_client/Output_${{ matrix.platform.name }}

      # クライアントビルド成果物アーカイブ（Linux）
      - name: Archive Client Build for Linux
        if: ${{ matrix.platform.buildClient && matrix.platform.name == 'StandaloneLinux64' }}
        run: |
          tar -czvf client_output.tar.gz moorestech_client/Output_${{ matrix.platform.name }}

      - name: Upload Client Build for Linux
        if: ${{ matrix.platform.buildClient && matrix.platform.name == 'StandaloneLinux64' }}
        uses: actions/upload-artifact@v4
        with:
          name: Client_Output_${{ matrix.platform.name }}
          path: ./client_output.tar.gz
