      default: 1.58
    - key: boundaryWarpOctaves
      type: integer
      default: 3
    - key: boundaryWarpStrength
      type: number
      default: 100
    - key: boundaryWarpFrequency
      type: number
      default: 0.0024
    - key: boundaryNoiseAmount
      type: number
      default: 0.207
    - key: boundaryNoiseFrequency
      type: number
      default: 1
    # === 共通テクスチャレイヤー（rockLayer→addressablePath） ===
    # === Common texture layer (rockLayer to addressablePath) ===
    - key: rockLayerAddressablePath
      type: string
      default: ""
    # === 生成レイヤーのオン/オフ ===
    # === Generation layer toggles ===
    - key: generateHeightmap
      type: boolean
      default: true
    - key: generateTexture
      type: boolean
      default: true
    - key: generateDetail
      type: boolean
      default: true
    - key: generateObject
      type: boolean
      default: true
    - key: generateOre
      type: boolean
      default: true
    # === バイオーム有効/無効 ===
    # === Biome enable flags ===
    - key: grasslandEnabled
      type: boolean
      default: true
    - key: forestEnabled
      type: boolean
      default: true
    - key: savannaEnabled
      type: boolean
      default: true
    - key: desertEnabled
      type: boolean
      default: true
    - key: mesaEnabled
      type: boolean
      default: true
    - key: alpineEnabled
      type: boolean
      default: true
    - key: jungleEnabled
      type: boolean
      default: true
    - key: woodsEnabled
      type: boolean
      default: true
    # === バイオーム定義（各 BiomeConfig を写経） ===
    # === Biome definitions (each BiomeConfig transcribed) ===
    - key: grassland
      type: object
      properties:
      - key: frequency
        type: number
        default: 0.0004
      - key: amplitude
        type: number
        default: 1
      - key: detailFrequency
        type: number
        default: 0.02
      - key: detailAmplitude
        type: number
        default: 0.08
      - key: baseHeight
        type: number
        default: 0.009333
      - key: hillAmplitude
        type: number
        default: 0.12
      - key: terrainLayerAddressablePath
        type: string
        default: ""
      - key: textureConfig
        ref: biomeTextureConfig
      - key: treePlacement
        ref: treePlacementConfig
      - key: objectConfig
        ref: biomeObjectConfig
      - key: detailConfig
        ref: biomeDetailConfig
      - key: shoreConfig
        ref: biomeShoreConfig
      - key: boundaryConfig
        ref: biomeBoundaryConfig
    - key: forest
