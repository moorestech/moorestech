# NOTE このyamlに記述されているスキーマのコード、JSONローダーはSourceGeneratorによって自動生成されます。そのため、このスキーマのクラスやローダーを実装する必要はありません。
# NOTE The schema code and JSON loader described in this YAML are automatically generated by the SourceGenerator. Therefore, you do not need to implement the classes or loaders for this schema.

# マップ生成設定スキーマ。algorithm で生成器を選択し、priority で複数modから1件を選ぶ。
# algorithmParam は algorithm 別の実パラメータ（VanillaGenerator は MapMaking パイプライン Config 一式）。
# Map generation config schema. algorithm selects a generator; priority picks one entry across mods.
# algorithmParam holds algorithm-specific parameters (VanillaGenerator = the MapMaking pipeline Config set).

id: generation
type: object
isDefaultOpen: true
properties:
- key: algorithm
  type: enum
  options:
  - None
  - VanillaGenerator
- key: priority
  type: integer
  default: 0
- key: algorithmParam
  switch: ./algorithm
  cases:
  - when: None
    type: object
    optional: true
    properties: []
  - when: VanillaGenerator
    type: object
    properties:
    # === スポーン候補探索（SpawnSearchConfig を内包） ===
    # === Spawn candidate search (embeds SpawnSearchConfig) ===
    - key: useSpawnOffsetSearch
      type: boolean
      default: false
    - key: spawnSearch
      type: object
      properties:
      - key: overrideSpawnScenePosition
        type: boolean
        default: false
      - key: spawnScenePosition
        type: vector2
      - key: scanCellSize
        type: number
        default: 50
      - key: scanExtent
        type: number
        default: 0
      - key: windowMargin
        type: number
        default: 200
      - key: maxDetailedResolution
        type: integer
        default: 1600
      - key: minGrasslandArea
        type: number
        default: 200000
      - key: minForestArea
        type: number
        default: 150000
      - key: minBorderContact
        type: number
        default: 200
      - key: grassClearanceMin
        type: number
        default: 30
      - key: waterClearanceMin
        type: number
        default: 60
      - key: wGrasslandArea
        type: number
        default: 1
      - key: wForestArea
        type: number
        default: 0.5
      - key: wBorderContact
        type: number
        default: 50
      - key: wInland
        type: number
        default: 1
      - key: topK
        type: integer
        default: 32
      - key: expandFactor
        type: number
        default: 1.8
      - key: maxExpandIterations
        type: integer
        default: 4
    # === 出力・地形サイズ・チャンク・シード ===
    # === Output / terrain size / chunk / seed ===
    - key: resolutionPreset
      type: enum
      options:
      - _256
      - _512
      - _1024
      - _2048
    - key: terrainHeight
      type: number
      default: 600
    - key: terrainWidth
      type: number
      default: 1000
    - key: terrainLength
      type: number
      default: 1000
    - key: gridSizeX
      type: integer
      default: 5
    - key: gridSizeZ
      type: integer
      default: 5
    - key: seed
      type: integer
      default: 160
    - key: worldOffsetX
      type: number
      default: 0
    - key: worldOffsetZ
      type: number
      default: 0
    - key: spawnWorldPosition
      type: vector2
    - key: chunkPadding
      type: integer
      default: 50
    - key: overrideResolution
      type: integer
      default: 0
    # === 大陸性・浸食・海面ノイズ ===
    # === Continentalness / erosion / sea-level noise ===
    - key: continentalnessFrequency
      type: number
      default: 0.00043
    - key: continentalnessOctaves
      type: integer
      default: 5
    - key: continentalnessPersistence
      type: number
      default: 0.496
    - key: landThreshold
      type: number
      default: 0.35
    - key: erosionFrequency
      type: number
      default: 0.00014
    - key: erosionOctaves
      type: integer
      default: 3
    - key: erosionStrength
      type: number
      default: 0.156
    - key: seaLevel
      type: number
      default: 0.008333
    # === 共通海岸線・境界設定 ===
    # === Common shore / boundary config ===
    - key: shoreConfig
      ref: biomeShoreConfig
    - key: boundaryConfig
      ref: biomeBoundaryConfig
    # === グローバル鉱脈設定（WorldOreConfig） ===
    # === Global vein config (WorldOreConfig) ===
    - key: oreConfig
      type: object
      properties:
      # item 鉱脈エントリ（OreEntry）。prefab を veinGuid(mapVeins) に置換、鉱石岩は出力しない
      # item vein entries (OreEntry). prefab replaced with veinGuid(mapVeins); no ore-rock emitted
      - key: entries
        type: array
        overrideCodeGeneratePropertyName: OreEntryElement
        items:
          type: object
          properties:
          - key: veinGuid
            type: uuid
            foreignKey:
              schemaId: map
              foreignKeyIdPath: /mapVeins/[*]/veinGuid
              displayElementPath: /mapVeins/[*]/veinName
          - key: biomes
            type: array
            items:
              type: enum
              options:
              - None
              - Grassland
              - Forest
              - Savanna
              - Desert
              - Mesa
              - Alpine
              - Jungle
              - Woods
          - key: bands
            type: array
            overrideCodeGeneratePropertyName: OreBandElement
            items:
              type: object
              properties:
              - key: outerRadiusMeters
                type: number
                default: -1
              - key: density
                type: number
                default: 0.5
              - key: maxObjectsPerCluster
                type: integer
                default: 5
              - key: clusterRadius
                type: number
                default: 8
              - key: minDistanceBetweenOres
                type: number
                default: 1.5
              - key: placementRetries
                type: integer
                default: 10
          - key: useSlopeFilter
            type: boolean
            default: true
          - key: slopeMax
            type: number
            default: 30
          - key: slopeSmoothness
            type: number
            default: 5
          - key: minDistanceFromOthers
            type: number
            default: 3
      # fluid 鉱脈エントリ（FluidVeinEntry、OreEntry と同形。veinGuid は fluid 種別の mapVeins を指す）
      # fluid vein entries (FluidVeinEntry, mirrors OreEntry; veinGuid targets fluid-type mapVeins)
      - key: fluidEntries
        type: array
        overrideCodeGeneratePropertyName: FluidVeinEntryElement
        items:
          type: object
          properties:
          - key: veinGuid
            type: uuid
            foreignKey:
              schemaId: map
              foreignKeyIdPath: /mapVeins/[*]/veinGuid
              displayElementPath: /mapVeins/[*]/veinName
          - key: biomes
            type: array
            items:
              type: enum
              options:
              - None
              - Grassland
              - Forest
              - Savanna
              - Desert
              - Mesa
              - Alpine
              - Jungle
              - Woods
          - key: bands
            type: array
            overrideCodeGeneratePropertyName: FluidOreBandElement
            items:
              type: object
              properties:
              - key: outerRadiusMeters
                type: number
                default: -1
              - key: density
                type: number
                default: 0.5
              - key: maxObjectsPerCluster
                type: integer
                default: 5
              - key: clusterRadius
                type: number
                default: 8
              - key: minDistanceBetweenOres
                type: number
                default: 1.5
              - key: placementRetries
                type: integer
                default: 10
          - key: useSlopeFilter
            type: boolean
            default: true
          - key: slopeMax
            type: number
            default: 30
          - key: slopeSmoothness
            type: number
            default: 5
          - key: minDistanceFromOthers
            type: number
            default: 3
      - key: borderMargin
        type: number
        default: 5
    # === バイオーム分布ノイズ・ボロノイ・境界ワープ ===
    # === Biome distribution noise / voronoi / boundary warp ===
    - key: biomeScale
      type: number
      default: 0.001
    - key: biomeBlendRadius
      type: integer
      default: 200
    - key: voronoiCellSize
      type: number
      default: 1000
    - key: voronoiJitter
