# NOTE このyamlに記述されているスキーマのコード、JSONローダーはSourceGeneratorによって自動生成されます。そのため、このスキーマのクラスやローダーを実装する必要はありません。
# NOTE The schema code and JSON loader described in this YAML are automatically generated by the SourceGenerator. Therefore, you do not need to implement the classes or loaders for this schema.

# 建設メニューの構成定義。カテゴリツリーと接続ツールを持つ。categoriesの配列順がそのまま表示順
# Build menu composition: the category tree and connect tools. The array order of categories is the display order

id: buildMenu
type: object
isDefaultOpen: true
properties:
- key: categories
  type: array
  openedByDefault: true
  overrideCodeGeneratePropertyName: BuildMenuCategoryElement
  items:
    type: object
    properties:
    - key: name
      type: string
    - key: subCategories
      type: array
      overrideCodeGeneratePropertyName: BuildMenuSubCategoryElement
      items:
        type: object
        properties:
        - key: name
          type: string
        # このサブカテゴリに載るエントリの供給元。blocks以外は該当種別の全エントリがここへ入る
        # Entry source for this sub category. Non-blocks sources place all entries of that kind here
        - key: entrySource
          type: enum
          options:
          - blocks
          - trainCars
          - connectTools
          - blueprintCopyTool
          - savedBlueprints
          default: blocks
# リプレース設置で相互置き換え可能なブロック群。同一ファミリー内のブロックのみ相互リプレース可
# Replace-placement families; only blocks within the same family are mutually replaceable
- key: replaceFamilies
  type: array
  overrideCodeGeneratePropertyName: ReplaceFamilyElement
  items:
    type: object
    properties:
    - key: familyName
      type: string
    - key: targetBlocks
      type: array
      overrideCodeGeneratePropertyName: ReplaceFamilyTargetBlockElement
      items:
        type: object
        properties:
        - key: blockGuid
          type: uuid
          foreignKey:
            schemaId: blocks
            foreignKeyIdPath: /data/[*]/blockGuid
            displayElementPath: /data/[*]/name
- key: connectTools
  type: array
  openedByDefault: true
  overrideCodeGeneratePropertyName: ConnectToolMasterElement
  items:
    type: object
    thumbnail: imagePath
    properties:
    - key: connectToolGuid
      type: uuid
      autoGenerated: true
    - key: name
      type: string
    - key: toolType
      type: enum
      options:
      - electricWire
      - rail
      - gearChain
    - key: imagePath
      type: string
      thumbnail: true
    - key: sortPriority
      type: integer
      default: 0
    - key: initialUnlocked
      type: boolean
      default: false
    - key: lengthPerUnit
      type: number
      default: 1
    - key: requiredItems
      type: array
      overrideCodeGeneratePropertyName: ConnectToolRequiredItemElement
      items:
        type: object
        properties:
        - key: itemGuid
          type: uuid
          foreignKey:
            schemaId: items
            foreignKeyIdPath: /data/[*]/itemGuid
            displayElementPath: /data/[*]/name
        - key: count
          type: integer
          default: 1
