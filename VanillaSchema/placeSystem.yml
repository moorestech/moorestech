# NOTE The schema code and JSON loader described in this YAML are automatically generated by the SourceGenerator. Therefore, you do not need to implement the classes or loaders for this schema.

id: placeSystem
type: object
isDefaultOpen: true
properties:
- key: data
  type: array
  openedByDefault: true
  overrideCodeGeneratePropertyName: PlaceSystemMasterElement
  items:
    type: object
    properties:
    - key: placeMode
      type: enum
      options:
      - TrainRail
      - TrainRailConnect
      - TrainCar
      - GearChainPoleConnect
      - ElectricWireConnect
      - BeltConveyor
    - key: priority
      type: integer
      autoIncrement:
        direction: asc
        step: 10
        startWith: 100
    - key: usePlaceItems
      type: array
      items:
        type: uuid
        foreignKey:
          schemaId: items
          foreignKeyIdPath: /data/[*]/itemGuid
          displayElementPath: /data/[*]/name
    - key: placeParam
      switch: ./placeMode
      cases:
      - when: TrainRail
        type: object
        properties: []
      - when: TrainRailConnect
        type: object
        properties: []
      - when: TrainCar
        type: object
        properties: []
      - when: GearChainPoleConnect
        type: object
        properties: []
      - when: ElectricWireConnect
        type: object
        properties: []
      - when: BeltConveyor
        type: object
        properties:
        - key: upBlockGuid
          type: uuid
          foreignKey:
            schemaId: blocks
            foreignKeyIdPath: /data/[*]/blockGuid
            displayElementPath: /data/[*]/name
        - key: downBlockGuid
          type: uuid
          foreignKey:
            schemaId: blocks
            foreignKeyIdPath: /data/[*]/blockGuid
            displayElementPath: /data/[*]/name
        - key: straightBlocks
          type: array
          items:
            type: object
            properties:
            - key: length
              type: integer
            - key: blockGuid
              type: uuid
              foreignKey:
                schemaId: blocks
                foreignKeyIdPath: /data/[*]/blockGuid
                displayElementPath: /data/[*]/name

