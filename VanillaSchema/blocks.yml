# NOTE このyamlに記述されているスキーマのコード、JSONローダーはSourceGeneratorによって自動生成されます。そのため、このスキーマのクラスやローダーを実装する必要はありません。
# NOTE The schema code and JSON loader described in this YAML are automatically generated by the SourceGenerator. Therefore, you do not need to implement the classes or loaders for this schema.

id: blocks
type: object
isDefaultOpen: true
globalDefineInterface:
- interfaceName: IBlockConnector
  properties:
  - key: connectorGuid
    type: uuid
  - key: offset
    type: vector3Int
  - key: directions
    type: array
    optional: true
    items:
      type: vector3Int
  - key: shapeGuid
    type: uuid
    optional: true
defineInterface:
- interfaceName: IMachineParam
  properties:
  - key: inputSlotCount
    type: integer
    default: 0
  - key: outputSlotCount
    type: integer
    default: 0
  - key: inputTankCount
    type: integer
    default: 0
  - key: outputTankCount
    type: integer
    default: 0
  - key: innerTankCapacity
    type: number
    default: 0
  - key: moduleSlotCount
    type: integer
    default: 0
- interfaceName: IChestParam
  properties:
  - key: itemSlotCount
    type: integer
- interfaceName: IRailEndpointBlockParam
  properties:
  - key: maxConnectableRailLength
    type: number
    default: 100
- interfaceName: IMinerParam
  properties:
  - key: outputItemSlotCount
    type: integer
  - key: mineSettings
    ref: mineSettings
- interfaceName: IInventoryConnectors
  properties:
  - key: inventoryConnectors
    ref: inventoryConnects
- interfaceName: IGearConnectors
  properties:
    - key: gear
      ref: gear
- interfaceName: IGearOverloadParam
  properties:
  - key: overloadMaxRpm
    type: number
    default: 0
  - key: overloadMaxTorque
    type: number
    default: 0
  - key: destructionCheckInterval
    type: number
    default: 1
  - key: baseDestructionProbability
    type: number
    default: 0
- interfaceName: IFuelItemSlotParam
  properties:
  - key: fuelItemSlotCount
    type: integer

properties:
- key: connectorSettings
  type: object
  optional: true
  properties:
  - key: connectorShapes
    type: array
    optional: true
    items:
      type: object
      properties:
      - key: shapeGuid
        type: uuid
        autoGenerated: true
      - key: name
        type: string
  - key: connectableShapePairs
    type: array
    optional: true
    items:
      type: object
      properties:
      - key: shape0
        type: uuid
        foreignKey:
          schemaId: blocks
          foreignKeyIdPath: /connectorSettings/connectorShapes/[*]/shapeGuid
          displayElementPath: /connectorSettings/connectorShapes/[*]/name
      - key: shape1
        type: uuid
        foreignKey:
          schemaId: blocks
          foreignKeyIdPath: /connectorSettings/connectorShapes/[*]/shapeGuid
          displayElementPath: /connectorSettings/connectorShapes/[*]/name
- key: data
  type: array
  openedByDefault: true
  overrideCodeGeneratePropertyName: BlockMasterElement
  items:
    type: object
    properties:
    - key: blockGuid
      type: uuid
      autoGenerated: true
    - key: name
      type: string
    - key: blockType
      type: enum
      options:
      - Block
      - BeltConveyor
      - Chest
      - ElectricMachine
      - ElectricPole
      - ElectricGenerator
      - ElectricMiner
      - Gear
      - Shaft
      - GearChainPole
      - GearMachine
      - SimpleGearGenerator
      - FuelGearGenerator
      - GearBeltConveyor
      - GearMiner
      - GearMapObjectMiner
      - TrainRail
      - TrainStation
      - TrainItemPlatform
      - TrainFluidPlatform
      - FluidPipe
      - BaseCamp
      - GearPump
      - ElectricPump
      - GearToElectricGenerator
      - ElectricToGearGenerator
      - FilterSplitter
      - CleanRoomWall
      - CleanRoomDoor
      - CleanRoomItemHatch
      - CleanRoomPipeHatch
      - CleanRoomAirFilter
      - CleanRoomMachine
    - key: requiredItems
      type: array
      optional: true
      overrideCodeGeneratePropertyName: ConstructionRequiredItemElement
      items:
        type: object
        properties:
        - key: itemGuid
          type: uuid
          foreignKey:
            schemaId: items
            foreignKeyIdPath: /data/[*]/itemGuid
            displayElementPath: /data/[*]/name
        - key: count
          type: integer
          default: 1
    - key: imagePath
      type: string
      optional: true
    - key: category
      type: string
      foreignKey:
        schemaId: blockCategories
        foreignKeyIdPath: /data/[*]/name
        displayElementPath: /data/[*]/name
    - key: subCategory
      type: string
    # ElectricPoleとTrainRailはsortPriority最小（同値はname昇順）をコネクトツールで自動設置する
    # Connect tools auto-place the lowest-sortPriority ElectricPole or TrainRail block, breaking ties by name ascending
    - key: sortPriority
      type: integer
      optional: true
      default: 0
    - key: initialUnlocked
      type: boolean
      optional: true
      default: false
    - key: blockSize
      type: vector3Int
      default:
      - 1
      - 1
      - 1
    - key: blockPrefabAddressablesPath
      type: string
      optional: true
    - key: blockUIAddressablesPath
      type: string
      optional: true
    - key: blockParam
      switch: ./blockType
      cases:
      - when: Block
        type: object
        properties: []
      - when: BeltConveyor
        type: object
        implementationInterface:
        - IInventoryConnectors
        properties:
        - key: beltConveyorItemCount
          type: integer
          default: 1
        - key: timeOfItemEnterToExit
          type: number
          default: 1
        - key: slopeType
          type: enum
          options:
          - Straight
          - Up
          - Down
        - key: inventoryConnectors
          ref: inventoryConnects
      - when: Chest
        type: object
        implementationInterface:
        - IChestParam
        - IInventoryConnectors
        properties:
        - key: itemSlotCount
          type: integer
          default: 5
        - key: inventoryConnectors
          ref: inventoryConnects
      - when: ElectricMachine
        type: object
        implementationInterface:
        - IInventoryConnectors
        - IMachineParam
        properties:
        - key: requiredPower
          type: number
          default: 5
        - key: idlePowerRate
          type: number
          default: 0.2
        - key: inputSlotCount
          type: integer
          default: 1
        - key: outputSlotCount
          type: integer
          default: 1
        - key: inventoryConnectors
          ref: inventoryConnects
        - key: inputTankCount
          type: integer
          default: 0
        - key: outputTankCount
          type: integer
          default: 0
        - key: innerTankCapacity
          type: number
          default: 0
        - key: moduleSlotCount
          type: integer
          default: 0
        - key: fluidInventoryConnectors
          ref: fluidInventoryConnects
        - key: maxWireConnectionCount
          type: integer
          default: 2
        - key: maxWireLength
          type: number
          default: 8
      - when: ElectricPole
        type: object
        properties:
        - key: poleConnectionRange
          type: integer
          default: 5
        - key: poleConnectionHeightRange
          type: integer
          default: 5
        - key: machineConnectionRange
          type: integer
          default: 5
        - key: machineConnectionHeightRange
          type: integer
          default: 5
        - key: maxWireConnectionCount
          type: integer
          default: 8
        - key: maxWireLength
          type: number
          default: 12
      - when: ElectricGenerator
        type: object
        implementationInterface:
        - IInventoryConnectors
        - IFuelItemSlotParam
        properties:
        - key: fuelItemSlotCount
