# ベルトコンベアの設置ファミリー定義。1エントリが直線と任意の上り/下りからなる1つの敷設グループを表す。
# Belt conveyor placement families; each entry groups one straight block with optional up/down blocks.
- key: beltConveyorFamilies
  type: array
  items:
    type: object
    properties:
    # 斜面を持たないファミリー（分岐器など）では上り/下りを持たない
    # Families without slopes (e.g. splitters) omit up/down
    - key: upBlockGuid
      type: uuid
      optional: true
      foreignKey:
        schemaId: blocks
        foreignKeyIdPath: /data/[*]/blockGuid
        displayElementPath: /data/[*]/name
    - key: downBlockGuid
      type: uuid
      optional: true
      foreignKey:
        schemaId: blocks
        foreignKeyIdPath: /data/[*]/blockGuid
        displayElementPath: /data/[*]/name
    # ファミリーの1セル直線コンベア
    # The family's single-cell straight conveyor
    - key: straightBlockGuid
      type: uuid
      foreignKey:
        schemaId: blocks
        foreignKeyIdPath: /data/[*]/blockGuid
        displayElementPath: /data/[*]/name

# ブロック破壊カテゴリ定義。カテゴリキーと、それに属するブロックを外部キーで一元管理する
# Block destruction category definitions; each maps a category key to its member blocks via foreign key
- key: blockDestructionCategories
  type: array
  items:
    type: object
    properties:
    - key: categoryKey
      type: string
    - key: targetBlocks
      type: array
