id: train
type: object
isDefaultOpen: true
properties:
- key: trainCars
  type: array
  openedByDefault: true
  overrideCodeGeneratePropertyName: TrainCarMasterElement
  items:
    type: object
    properties:
    - key: trainCarGuid
      type: uuid
      autoGenerated: true
    - key: itemGuid
      type: uuid
      foreignKey:
        schemaId: items
        foreignKeyIdPath: /data/[*]/itemGuid
        displayElementPath: /data/[*]/name
    - key: addressablePath
      type: string
      optional: true
      default: ""
    - key: tractionForce
      type: integer
    - key: inventorySlots
      type: integer
      default: 1
    - key: length
      type: integer
    - key: trainFuelItems
      type: array
      optional: true
      items:
        type: object
        properties:
        - key: itemGuid
          type: uuid
          foreignKey:
            schemaId: items
            foreignKeyIdPath: /data/[*]/itemGuid
            displayElementPath: /data/[*]/name
        - key: fuelDurationPerItem
          type: number
          default: 1
    - key: trainFuelFluids
      type: array
      optional: true
      items:
        type: object
        properties:
        - key: fluidGuid
          type: uuid
          foreignKey:
            schemaId: fluids
            foreignKeyIdPath: /data/[*]/fluidGuid
            displayElementPath: /data/[*]/name
        - key: fuelDurationPerUnitVolume
          type: number
          default: 1
- key: railItems
  type: array
  overrideCodeGeneratePropertyName: RailItemMasterElement
  items:
    type: object
    properties:
    - key: itemGuid
      type: uuid
      foreignKey:
        schemaId: items
        foreignKeyIdPath: /data/[*]/itemGuid
        displayElementPath: /data/[*]/name
    - key: consumptionPerUnitLength
      type: integer
