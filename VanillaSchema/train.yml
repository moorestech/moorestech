id: train
type: object
isDefaultOpen: true
properties:
- key: trainCars
  type: array
  openedByDefault: true
  overrideCodeGeneratePropertyName: TrainCarMasterElement
  items:
    type: object
    properties:
    - key: trainCarGuid
      type: uuid
      autoGenerated: true
    - key: itemGuid
      type: uuid
      foreignKey:
        schemaId: items
        foreignKeyIdPath: /data/[*]/itemGuid
        displayElementPath: /data/[*]/name
    - key: requiredItems
      type: array
      optional: true
      overrideCodeGeneratePropertyName: TrainCarRequiredItemElement
      items:
        type: object
        properties:
        - key: itemGuid
          type: uuid
          foreignKey:
            schemaId: items
            foreignKeyIdPath: /data/[*]/itemGuid
            displayElementPath: /data/[*]/name
        - key: count
          type: integer
          default: 1
    - key: initialUnlocked
      type: boolean
      optional: true
      default: false
    - key: addressablePath
      type: string
      optional: true
      default: ""
    - key: weight
      type: integer
    - key: tractionForce
      type: integer
    - key: inventorySlots
      type: integer
      default: 1
    - key: length
      type: integer
    - key: defaultContainerType
      type: enum
      options:
      - None
      - Item
      - Fluid
      default: None
    - key: fluidCapacity
      type: number
      default: 0
    - key: trainFuelItems
      type: array
      optional: true
      items:
        type: object
        properties:
        - key: itemGuid
          type: uuid
          foreignKey:
            schemaId: items
            foreignKeyIdPath: /data/[*]/itemGuid
            displayElementPath: /data/[*]/name
        - key: fuelDurationPerItem
          type: number
          default: 1
    - key: trainFuelFluids
      type: array
      optional: true
      items:
        type: object
        properties:
        - key: fluidGuid
          type: uuid
          foreignKey:
            schemaId: fluids
            foreignKeyIdPath: /data/[*]/fluidGuid
            displayElementPath: /data/[*]/name
        - key: fuelDurationPerUnitVolume
          type: number
          default: 1
    - key: ridableSeatCount
      type: integer
      default: 0
- key: railItems
  type: array
  overrideCodeGeneratePropertyName: RailItemMasterElement
  items:
    type: object
    properties:
    - key: itemGuid
      type: uuid
      foreignKey:
        schemaId: items
        foreignKeyIdPath: /data/[*]/itemGuid
        displayElementPath: /data/[*]/name
    - key: railLengthPerItem
      type: integer
- key: itemContainer
  type: object
  properties:
  - key: weight
    type: integer
    default: 40
- key: fluidContainer
  type: object
  properties:
  - key: weight
    type: integer
    default: 40
- key: motionParameters
  type: object
  properties:
  # Divided by 10000000
  - key: friction
    type: integer
    default: 35300
  # Divided by 10000000
  - key: airResistance
    type: integer
    default: 117
  # Unit: km/h/s. Converted to m/s^2 in TrainUnitMaster.
  - key: maxBrakeDecelerationKmhPerSecond
    type: number
    default: 11
  - key: masconLevelMaximum
    type: integer
    default: 16777216
