id: train
type: object
isDefaultOpen: true
properties:
- key: trainCars
  type: array
  openedByDefault: true
  overrideCodeGeneratePropertyName: TrainCarMasterElement
  items:
    type: object
    properties:
    - key: trainCarGuid
      type: uuid
      autoGenerated: true
    - key: itemGuid
      type: uuid
      foreignKey:
        schemaId: items
        foreignKeyIdPath: /data/[*]/itemGuid
        displayElementPath: /data/[*]/name
    - key: addressablePath
      type: string
      optional: true
      default: ""
    - key: weight
      type: integer
    - key: tractionForce
      type: integer
    - key: inventorySlots
      type: integer
      default: 1
    - key: length
      type: integer
    - key: trainFuelItems
      type: array
      optional: true
      items:
        type: object
        properties:
        - key: itemGuid
          type: uuid
          foreignKey:
            schemaId: items
            foreignKeyIdPath: /data/[*]/itemGuid
            displayElementPath: /data/[*]/name
        - key: fuelDurationPerItem
          type: number
          default: 1
    - key: trainFuelFluids
      type: array
      optional: true
      items:
        type: object
        properties:
        - key: fluidGuid
          type: uuid
          foreignKey:
            schemaId: fluids
            foreignKeyIdPath: /data/[*]/fluidGuid
            displayElementPath: /data/[*]/name
        - key: fuelDurationPerUnitVolume
          type: number
          default: 1
- key: railItems
  type: array
  overrideCodeGeneratePropertyName: RailItemMasterElement
  items:
    type: object
    properties:
    - key: itemGuid
      type: uuid
      foreignKey:
        schemaId: items
        foreignKeyIdPath: /data/[*]/itemGuid
        displayElementPath: /data/[*]/name
    - key: consumptionPerUnitLength
      type: integer
- key: itemContainer
  type: object
  properties:
  - key: weight
    type: integer
    default: 40
- key: fluidContainer
  type: object
  properties:
  - key: weight
    type: integer
    default: 40
- key: motionParameters
  type: object
  properties:
  # Divided by 10000000
  - key: friction
    type: integer
    default: 35300
  # Divided by 10000000
  - key: airResistance
    type: integer
    default: 117
  - key: speedWeight
    type: number
    default: 0.09
  - key: autoRunMaxSpeedDistanceCoefficient
    type: number
    default: 10000.0
  - key: autoRunMaxSpeedOffset
    type: number
    default: 10.0
  - key: autoRunSpeedBufferMargin
    type: number
    default: 0.02
  - key: tractionForceAccelerationRate
    type: number
    default: 1.0
  - key: manualControlDecelerationFactor
    type: number
    default: 1.0
  - key: masconLevelMaximum
    type: integer
    default: 16777216
