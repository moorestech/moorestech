# NOTE このyamlに記述されているスキーマのコード、JSONローダーはSourceGeneratorによって自動生成されます。そのため、このスキーマのクラスやローダーを実装する必要はありません。
# NOTE The schema code and JSON loader described in this YAML are automatically generated by the SourceGenerator. Therefore, you do not need to implement the classes or loaders for this schema.

id: gameAction
type: array
overrideCodeGeneratePropertyName: GameActionElement
items:
  type: object
  properties:
  - key: gameActionType
    type: enum
    options:
    - giveItem
    - unlockCraftRecipe
    - unlockItemRecipeView
    - unlockChallengeCategory
    - unlockMachineRecipe
    - unlockBlock
    - unlockTrainCar
    - playSkit
    - playBackgroundSkit
    - unlockItemStackLevel
    - unlockPlayerInventorySlotLevel
  - key: gameActionParam
    switch: ./gameActionType
    cases:
    - when: playBackgroundSkit
      type: object
      isDefaultOpen: true
      properties: []
    - when: unlockCraftRecipe
      type: object
      isDefaultOpen: true
      properties:
      - key: unlockRecipeGuids
        type: array
        items:
          type: uuid
          foreignKey:
            schemaId: craftRecipes
            foreignKeyIdPath: /data/[*]/craftRecipeGuid
            displayElementPath: /data/[*]/craftRecipeGuid
    - when: unlockItemRecipeView
      type: object
      isDefaultOpen: true
      properties:
      - key: unlockItemGuids
        type: array
        items:
          type: uuid
          foreignKey:
            schemaId: items
            foreignKeyIdPath: /data/[*]/itemGuid
            displayElementPath: /data/[*]/name
    - when: unlockMachineRecipe
      type: object
      isDefaultOpen: true
      properties:
      - key: unlockMachineRecipeGuids
        type: array
        items:
          type: uuid
          foreignKey:
            schemaId: machineRecipes
            foreignKeyIdPath: /data/[*]/machineRecipeGuid
            displayElementPath: /data/[*]/machineRecipeGuid
    - when: unlockBlock
      type: object
      isDefaultOpen: true
      properties:
      - key: unlockBlockGuids
        type: array
        items:
          type: uuid
          foreignKey:
            schemaId: blocks
            foreignKeyIdPath: /data/[*]/blockGuid
            displayElementPath: /data/[*]/name
    - when: unlockTrainCar
      type: object
      isDefaultOpen: true
      properties:
      - key: unlockTrainCarGuids
        type: array
        items:
          type: uuid
          foreignKey:
            schemaId: train
            foreignKeyIdPath: /trainCars/[*]/trainCarGuid
            displayElementPath: /trainCars/[*]/trainCarGuid
    - when: unlockChallengeCategory
      type: object
      isDefaultOpen: true
      properties:
      - key: unlockChallengeCategoryGuids
        type: array
        items:
          type: uuid
          foreignKey:
            schemaId: challenges
            foreignKeyIdPath: /data/[*]/categoryGuid
            displayElementPath: /data/[*]/categoryName
    - when: giveItem
      type: object
      isDefaultOpen: true
      properties:
      - key: rewardItems
        type: array
        isDefaultOpen: true
        overrideCodeGeneratePropertyName: GiveItemRewardElement
        items:
          type: object
          properties:
            - key: itemGuid
              type: uuid
              foreignKey:
                schemaId: items
                foreignKeyIdPath: /data/[*]/itemGuid
                displayElementPath: /data/[*]/name
            - key: itemCount
              type: integer
              default: 1
      - key: deliveryTarget
        type: enum
        default: allPlayers
        options:
        - allPlayers
        - actionInvoker
    - when: playSkit
      type: object
      isDefaultOpen: true
      properties:
      - key: skitAddressablePath
        type: string
      - key: playSortPriority
        type: number
        default: 0
      - key: playSkitType
        default: normal
        type: enum
        options:
          - normal
          - background
    - when: unlockItemStackLevel
      type: object
      isDefaultOpen: true
      properties:
      - key: targetItemGuids
        type: array
        items:
          type: uuid
          foreignKey:
            schemaId: items
            foreignKeyIdPath: /data/[*]/itemGuid
            displayElementPath: /data/[*]/name
      - key: level
        type: integer
        default: 2 
    - when: unlockPlayerInventorySlotLevel
      type: object
      isDefaultOpen: true
      properties:
      - key: level
        type: integer
