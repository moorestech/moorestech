# - torqueExponentUnder : Torque exponent for r <= 1 (under-speed); larger values make low-speed demand drop more sharply.
# - torqueExponentOver  : Torque exponent for r >  1 (over-speed); larger values make high-speed demand grow more sharply. Default 1.585 ≈ log2(3) yields "3x torque at 2x speed".
