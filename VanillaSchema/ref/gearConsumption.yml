#
# 各プロパティの意味:
# - baseRpm             : 基準となる消費RPM。r=1 のときの消費RPMそのもの。
# - minimumRpm          : 消費RPMの下限。要求が小さくても最低これだけは回す必要がある値。
# - baseTorque          : 基準となる消費トルク。r=1 のときの消費トルクそのもの。
# - torqueExponentUnder : r <= 1（減速側）での消費トルクの指数。大きいほど低速時に急激に軽くなる。
